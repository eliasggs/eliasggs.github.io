<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mapa de Instituciones — Villa Mercedes</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Archivo:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

<style>
  :root {
    --crema: #F3EFE6;
    --verde-cartel: #1F4D3D;
    --verde-claro: #3C7A5F;
    --terracota: #C1623E;
    --terracota-suave: #E8A989;
    --tinta: #1B1B17;
    --linea: #D8D0BC;
    --blanco: #FFFFFF;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
  }

  body {
    font-family: 'Archivo', sans-serif;
    background: var(--crema);
    color: var(--tinta);
    display: flex;
    flex-direction: column;
  }

  /* ---------- Encabezado ---------- */
  header {
    background: var(--verde-cartel);
    color: var(--crema);
    padding: 12px 20px;
    border-bottom: 4px solid var(--terracota);
    position: relative;
    overflow: hidden;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 14px;
  }

  header::before {
    content: "";
    position: absolute;
    top: -50px;
    right: -30px;
    width: 110px;
    height: 110px;
    border: 2px solid rgba(243,239,230,0.1);
    border-radius: 50%;
  }

  .titulo-grupo {
    display: flex;
    align-items: baseline;
    gap: 10px;
    flex-wrap: wrap;
  }

  .eyebrow {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--terracota-suave);
    white-space: nowrap;
  }

  h1 {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 19px;
    margin: 0;
    line-height: 1.1;
    letter-spacing: -0.01em;
    white-space: nowrap;
  }

  h1 em {
    font-style: italic;
    color: var(--terracota-suave);
  }

  .subt {
    display: none;
  }

  @media (max-width: 640px) {
    .eyebrow { display: none; }
    h1 { font-size: 16px; }
  }

  /* ---------- Layout principal ---------- */
  .app {
    display: flex;
    flex: 1 1 auto;
    min-height: 0;
    position: relative;
  }

  .mapa-contenedor {
    height: 100%;
    min-height: 0;
    flex: 1 1 auto;
  }

  /* ---------- Panel lateral (sidebar fijo, colapsable) ---------- */
  .panel-envoltorio {
    flex-shrink: 0;
    width: 300px;
    height: 100%;
    background: var(--blanco);
    border-right: 1px solid var(--linea);
    position: relative;
    overflow: hidden;
    transition: width 0.22s ease;
  }

  .panel-envoltorio.colapsado {
    width: 0;
  }

  .panel {
    width: 300px;
    height: 100%;
    padding: 16px 16px 24px;
    overflow-y: auto;
  }

  .boton-colapsar {
    position: absolute;
    top: 40%;
    left: 286px;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: var(--verde-cartel);
    color: var(--crema);
    border: 2px solid var(--blanco);
    box-shadow: 0 2px 8px rgba(27,27,23,0.25);
    cursor: pointer;
    z-index: 600;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    transition: left 0.22s ease, transform 0.22s ease, background 0.15s;
  }

  .boton-colapsar:hover { background: var(--verde-claro); }

  .app.colapsado .boton-colapsar {
    left: 0px;
    transform: rotate(180deg);
  }

  /* En mobile, el panel se convierte en overlay deslizante sobre el mapa */
  @media (max-width: 860px) {
    .panel-envoltorio {
      position: absolute;
      top: 0;
      left: 0;
      z-index: 550;
      box-shadow: 4px 0 18px rgba(27,27,23,0.18);
    }

    .panel-envoltorio.colapsado {
      width: 0;
      box-shadow: none;
    }
  }

  .panel-titulo {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--verde-claro);
    border-bottom: 2px solid var(--linea);
    padding-bottom: 8px;
    margin-bottom: 16px;
  }

  .grupo-filtro {
    margin-bottom: 8px;
    border-bottom: 1px solid var(--linea);
    padding-bottom: 8px;
  }

  /* Fila de categoría principal (Educativas / Culturales) */
  .fila-categoria {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 2px;
  }

  .fila-categoria h3 {
    font-family: 'Fraunces', serif;
    font-size: 15px;
    font-weight: 600;
    margin: 0;
    color: var(--verde-cartel);
    display: flex;
    align-items: center;
    gap: 7px;
    flex: 1;
    cursor: pointer;
    user-select: none;
  }

  .fila-categoria input[type="checkbox"] {
    width: 16px;
    height: 16px;
    accent-color: var(--verde-cartel);
    cursor: pointer;
    flex-shrink: 0;
  }

  .punto {
    width: 9px;
    height: 9px;
    border-radius: 50%;
    display: inline-block;
    flex-shrink: 0;
  }

  .punto.educativa { background: var(--verde-claro); }
  .punto.cultural { background: var(--terracota); }

  /* Botón expandir/colapsar (signo +) */
  .btn-expandir {
    width: 22px;
    height: 22px;
    border-radius: 5px;
    border: 1px solid var(--linea);
    background: var(--crema);
    color: var(--verde-cartel);
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    line-height: 1;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s, transform 0.15s;
  }

  .btn-expandir:hover { background: var(--linea); }

  .btn-expandir.abierto { transform: rotate(45deg); }

  /* Subniveles (anidado nivel 1: primario/secundario/adultos) */
  .subniveles {
    display: none;
    padding-left: 16px;
    margin-top: 2px;
  }

  .subniveles.abierto { display: block; }

  .fila-nivel {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 5px 2px;
  }

  .fila-nivel label.chk {
    flex: 1;
    padding: 4px;
    margin: 0;
  }

  /* Subniveles anidado nivel 2: turnos dentro de cada nivel */
  .subturnos {
    display: none;
    padding-left: 18px;
    margin-bottom: 4px;
  }

  .subturnos.abierto { display: block; }

  label.chk {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13.5px;
    padding: 5px 4px;
    cursor: pointer;
    border-radius: 6px;
    transition: background 0.15s;
    user-select: none;
  }

  label.chk:hover { background: var(--crema); }

  label.chk input {
    width: 15px;
    height: 15px;
    accent-color: var(--verde-cartel);
    cursor: pointer;
    flex-shrink: 0;
  }

  label.chk.turno { font-size: 13px; color: #5c5648; }

  .resultados-info {
    margin-top: 18px;
    padding-top: 14px;
    border-top: 1px solid var(--linea);
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--verde-claro);
  }

  .resultados-info strong {
    color: var(--verde-cartel);
    font-size: 20px;
    display: block;
    font-family: 'Fraunces', serif;
  }

  /* ---------- Mapa ---------- */
  #mapa {
    height: 100%;
    width: 100%;
    background: var(--linea);
  }

  /* ---------- Selector de estilo de mapa ---------- */
  .selector-estilo {
    position: absolute;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 500;
    background: var(--blanco);
    border-radius: 30px;
    box-shadow: 0 6px 20px rgba(27,27,23,0.22);
    padding: 4px;
    display: flex;
    gap: 2px;
  }

  .selector-estilo button {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    border: none;
    background: transparent;
    color: #8a8473;
    padding: 9px 16px;
    border-radius: 24px;
    cursor: pointer;
    transition: background 0.18s, color 0.18s;
    white-space: nowrap;
  }

  .selector-estilo button:hover {
    color: var(--verde-cartel);
  }

  .selector-estilo button.activo {
    background: var(--verde-cartel);
    color: var(--crema);
  }

  @media (max-width: 480px) {
    .selector-estilo { bottom: 14px; }
    .selector-estilo button { padding: 8px 11px; font-size: 10px; }
  }

  /* ---------- Popups ---------- */
  .leaflet-popup-content-wrapper {
    border-radius: 10px;
    box-shadow: 0 6px 24px rgba(27,27,23,0.18);
  }

  .leaflet-popup-content {
    margin: 16px 18px;
    width: 260px !important;
    font-family: 'Archivo', sans-serif;
  }

  .pop-tipo {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 4px;
    display: inline-block;
    margin-bottom: 8px;
  }

  .pop-tipo.educativa { background: #E3EEE7; color: var(--verde-cartel); }
  .pop-tipo.cultural { background: #F6E3D8; color: #8C4324; }

  .pop-nombre {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 16.5px;
    line-height: 1.25;
    margin: 0 0 8px;
    color: var(--tinta);
  }

  .pop-fila {
    font-size: 13px;
    line-height: 1.5;
    margin-bottom: 4px;
    color: #4a4640;
  }

  .pop-fila b { color: var(--tinta); }

  .pop-etiquetas {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    margin-top: 10px;
  }

  .pop-etiqueta {
    font-size: 11px;
    font-family: 'Space Mono', monospace;
    padding: 3px 7px;
    border-radius: 4px;
    background: var(--crema);
    border: 1px solid var(--linea);
    color: #5c5648;
  }

  .pop-etiqueta.activa-noche {
    background: #2B2B22;
    color: #F3EFE6;
    border-color: #2B2B22;
  }

  /* ---------- Marcadores personalizados ---------- */
  .marcador-icono {
    width: 30px;
    height: 30px;
    border-radius: 50% 50% 50% 0;
    transform: rotate(-45deg);
    border: 2px solid var(--blanco);
    box-shadow: 0 2px 6px rgba(0,0,0,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .marcador-icono span {
    transform: rotate(45deg);
    font-size: 13px;
    line-height: 1;
  }

  .marcador-icono.educativa { background: var(--verde-claro); }
  .marcador-icono.cultural { background: var(--terracota); }

  /* ---------- Footer ---------- */
  footer {
    background: var(--verde-cartel);
    color: rgba(243,239,230,0.6);
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    text-align: center;
    padding: 10px;
    letter-spacing: 0.04em;
    flex-shrink: 0;
  }

  /* Scrollbar discreta */
  .panel::-webkit-scrollbar { width: 6px; }
  .panel::-webkit-scrollbar-thumb { background: var(--linea); border-radius: 3px; }
</style>
</head>
<body>

<header>
  <div class="titulo-grupo">
    <span class="eyebrow">Municipalidad de Villa Mercedes</span>
    <h1>Educación <em>&amp;</em> Cultura en el mapa</h1>
  </div>
</header>

<div class="app" id="app">
  <button class="boton-colapsar" id="boton-colapsar" aria-label="Colapsar panel de filtros" title="Colapsar panel de filtros">‹</button>

  <div class="panel-envoltorio" id="panel-envoltorio">
    <aside class="panel">
      <div class="panel-titulo">Filtros</div>

      <!-- ===== Categoría: Educativas ===== -->
      <div class="grupo-filtro">
        <div class="fila-categoria">
          <input type="checkbox" id="cat-educativa" checked>
          <h3 id="titulo-educativa"><span class="punto educativa"></span>Educativas</h3>
          <button class="btn-expandir" data-target="niveles-educativa">+</button>
        </div>

        <div class="subniveles" id="niveles-educativa">

          <!-- Nivel: Primario -->
          <div class="fila-nivel">
            <label class="chk">
              <input type="checkbox" class="nivel" data-nivel="primario" checked>
              Primario
            </label>
            <button class="btn-expandir" data-target="turnos-primario">+</button>
          </div>
          <div class="subturnos" id="turnos-primario">
            <label class="chk turno"><input type="checkbox" class="turno-chk" data-nivel="primario" data-turno="turno_manana" checked> ☀️ Mañana</label>
            <label class="chk turno"><input type="checkbox" class="turno-chk" data-nivel="primario" data-turno="turno_tarde" checked> 🌤️ Tarde</label>
            <label class="chk turno"><input type="checkbox" class="turno-chk" data-nivel="primario" data-turno="turno_noche" checked> 🌙 Noche</label>
          </div>

          <!-- Nivel: Secundario -->
          <div class="fila-nivel">
            <label class="chk">
              <input type="checkbox" class="nivel" data-nivel="secundario" checked>
              Secundario
            </label>
            <button class="btn-expandir" data-target="turnos-secundario">+</button>
          </div>
          <div class="subturnos" id="turnos-secundario">
            <label class="chk turno"><input type="checkbox" class="turno-chk" data-nivel="secundario" data-turno="turno_manana" checked> ☀️ Mañana</label>
            <label class="chk turno"><input type="checkbox" class="turno-chk" data-nivel="secundario" data-turno="turno_tarde" checked> 🌤️ Tarde</label>
            <label class="chk turno"><input type="checkbox" class="turno-chk" data-nivel="secundario" data-turno="turno_noche" checked> 🌙 Noche</label>
          </div>

          <!-- Nivel: Adultos -->
          <div class="fila-nivel">
            <label class="chk">
              <input type="checkbox" class="nivel" data-nivel="adultos" checked>
              Educación para adultos
            </label>
            <button class="btn-expandir" data-target="turnos-adultos">+</button>
          </div>
          <div class="subturnos" id="turnos-adultos">
            <label class="chk turno"><input type="checkbox" class="turno-chk" data-nivel="adultos" data-turno="turno_manana" checked> ☀️ Mañana</label>
            <label class="chk turno"><input type="checkbox" class="turno-chk" data-nivel="adultos" data-turno="turno_tarde" checked> 🌤️ Tarde</label>
            <label class="chk turno"><input type="checkbox" class="turno-chk" data-nivel="adultos" data-turno="turno_noche" checked> 🌙 Noche</label>
          </div>

        </div>
      </div>

      <!-- ===== Categoría: Culturales ===== -->
      <div class="grupo-filtro">
        <div class="fila-categoria">
          <input type="checkbox" id="cat-cultural" checked>
          <h3><span class="punto cultural"></span>Culturales</h3>
        </div>
      </div>

      <div class="resultados-info">
        <strong id="contador-resultados">0</strong>
        instituciones visibles en el mapa
      </div>
    </aside>
  </div>

  <div class="mapa-contenedor" style="position: relative;">
    <div id="mapa"></div>
    <div class="selector-estilo" id="selector-estilo">
      <button data-estilo="claro" class="activo">Claro</button>
      <button data-estilo="calco">Calco</button>
      <button data-estilo="satelital">Satélite</button>
    </div>
  </div>
</div>

<footer>Datos de ejemplo — Villa Mercedes, San Luis · Actualizar en instituciones.json</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
<script>
  // ---------- Inicialización del mapa ----------
  const mapa = L.map('mapa', { zoomControl: true }).setView([-33.6755, -65.4540], 14);

  // Asegura que Leaflet recalcule su tamaño tras el primer render del layout
  // (importante porque ahora el alto del mapa depende de flex/grid, no de un vh fijo)
  setTimeout(() => mapa.invalidateSize(), 0);
  window.addEventListener('resize', () => mapa.invalidateSize());

  const capasEstilo = {
    claro: L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/attributions">CARTO</a>',
      maxZoom: 20,
      subdomains: 'abcd'
    }),
    calco: L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/light_all/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/attributions">CARTO</a>',
      maxZoom: 20,
      subdomains: 'abcd'
    }),
    satelital: L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
      attribution: 'Tiles &copy; Esri &mdash; Source: Esri, Maxar, Earthstar Geographics',
      maxZoom: 19
    })
  };

  let capaActual = capasEstilo.claro.addTo(mapa);

  function cambiarEstiloMapa(estilo) {
    if (capasEstilo[estilo] === capaActual) return;
    mapa.removeLayer(capaActual);
    capaActual = capasEstilo[estilo].addTo(mapa);

    document.querySelectorAll('.selector-estilo button').forEach(btn => {
      btn.classList.toggle('activo', btn.dataset.estilo === estilo);
    });
  }

  document.querySelectorAll('.selector-estilo button').forEach(btn => {
    btn.addEventListener('click', () => cambiarEstiloMapa(btn.dataset.estilo));
  });

  let instituciones = [];
  let marcadores = [];

  function crearIcono(tipo) {
    const emoji = tipo === 'educativa' ? '🏫' : '🎭';
    return L.divIcon({
      className: '',
      html: `<div class="marcador-icono ${tipo}"><span>${emoji}</span></div>`,
      iconSize: [30, 30],
      iconAnchor: [15, 28],
      popupAnchor: [0, -26]
    });
  }

  function construirPopupEducativa(inst) {
    let etiquetas = '';
    if (inst.primario) etiquetas += `<span class="pop-etiqueta">Primario</span>`;
    if (inst.secundario) etiquetas += `<span class="pop-etiqueta">Secundario</span>`;
    if (inst.adultos) etiquetas += `<span class="pop-etiqueta">Educ. adultos</span>`;
    if (inst.turno_manana) etiquetas += `<span class="pop-etiqueta">☀️ Mañana</span>`;
    if (inst.turno_tarde) etiquetas += `<span class="pop-etiqueta">🌤️ Tarde</span>`;
    if (inst.turno_noche) etiquetas += `<span class="pop-etiqueta activa-noche">🌙 Noche</span>`;

    return `
      <div class="pop-tipo educativa">Institución educativa</div>
      <p class="pop-nombre">${inst.nombre}</p>
      <div class="pop-fila"><b>Dirección:</b> ${inst.direccion || '—'}</div>
      <div class="pop-fila"><b>Teléfono:</b> ${inst.telefono || '—'}</div>
      <div class="pop-etiquetas">${etiquetas}</div>
    `;
  }

  function construirPopupCultural(inst) {
    return `
      <div class="pop-tipo cultural">Institución cultural</div>
      <p class="pop-nombre">${inst.nombre}</p>
      <div class="pop-fila"><b>Dirección:</b> ${inst.direccion || '—'}</div>
      <div class="pop-fila"><b>Teléfono:</b> ${inst.telefono || '—'}</div>
      <div class="pop-fila"><b>Email:</b> ${inst.email || '—'}</div>
      <div class="pop-fila"><b>Edades:</b> ${inst.edades || '—'}</div>
      <div class="pop-fila"><b>Horarios:</b> ${inst.horarios || '—'}</div>
      <div class="pop-fila"><b>Actividades:</b> ${inst.actividades || '—'}</div>
    `;
  }

  // ---------- Filtros jerárquicos: Categoría > Nivel > Turno ----------
  const nivelesEducativos = ['primario', 'secundario', 'adultos'];
  const turnosPosibles = ['turno_manana', 'turno_tarde', 'turno_noche'];

  function estadoNivel(nivel) {
    // Devuelve true si, para ese nivel, hay al menos un turno tildado
    const turnosDelNivel = document.querySelectorAll(`.turno-chk[data-nivel="${nivel}"]`);
    return Array.from(turnosDelNivel).some(t => t.checked);
  }

  function institucionVisible(inst) {
    if (inst.tipo === 'cultural') {
      return document.getElementById('cat-cultural').checked;
    }

    // Educativa: visible si la categoría general está activa,
    // Y al menos uno de sus niveles está activo (checkbox de nivel tildado
    // Y la institución tiene ese nivel),
    // Y para ese nivel, al menos uno de los turnos tildados coincide con un turno real de la institución.
    if (!document.getElementById('cat-educativa').checked) return false;

    return nivelesEducativos.some(nivel => {
      if (!inst[nivel]) return false; // la institución no tiene ese nivel
      const chkNivel = document.querySelector(`.nivel[data-nivel="${nivel}"]`);
      if (!chkNivel || !chkNivel.checked) return false; // el nivel está desactivado

      // turnos tildados para este nivel en la UI
      const turnosActivosUI = Array.from(document.querySelectorAll(`.turno-chk[data-nivel="${nivel}"]:checked`))
        .map(t => t.dataset.turno);

      // la institución debe tener al menos uno de esos turnos activos
      return turnosActivosUI.some(turno => inst[turno]);
    });
  }

  function renderizarMarcadores() {
    marcadores.forEach(m => mapa.removeLayer(m));
    marcadores = [];

    let visibles = 0;

    instituciones.forEach(inst => {
      if (institucionVisible(inst)) {
        visibles++;
        const marcador = L.marker([inst.lat, inst.lng], { icon: crearIcono(inst.tipo) });
        const contenido = inst.tipo === 'educativa'
          ? construirPopupEducativa(inst)
          : construirPopupCultural(inst);
        marcador.bindPopup(contenido);
        marcador.addTo(mapa);
        marcadores.push(marcador);
      }
    });

    document.getElementById('contador-resultados').textContent = visibles;
  }

  // ---------- Carga de datos ----------
  fetch('instituciones.json')
    .then(res => res.json())
    .then(data => {
      instituciones = data.instituciones;
      renderizarMarcadores();
    })
    .catch(err => {
      console.error('Error cargando instituciones.json', err);
      document.getElementById('contador-resultados').textContent = '0';
    });

  // ---------- Checkbox de categoría educativa: prende/apaga todos los niveles y turnos hijos ----------
  document.getElementById('cat-educativa').addEventListener('change', (e) => {
    const activo = e.target.checked;
    document.querySelectorAll('.nivel, .turno-chk').forEach(chk => chk.checked = activo);
    renderizarMarcadores();
  });

  document.getElementById('cat-cultural').addEventListener('change', renderizarMarcadores);

  // ---------- Checkbox de nivel: prende/apaga sus turnos hijos, y al revés actualiza el padre ----------
  document.querySelectorAll('.nivel').forEach(chkNivel => {
    chkNivel.addEventListener('change', () => {
      const nivel = chkNivel.dataset.nivel;
      document.querySelectorAll(`.turno-chk[data-nivel="${nivel}"]`).forEach(t => t.checked = chkNivel.checked);
      actualizarCheckboxCategoria();
      renderizarMarcadores();
    });
  });

  // ---------- Checkbox de turno: si se apagan todos los turnos de un nivel, apaga el nivel; si se prende uno, prende el nivel ----------
  document.querySelectorAll('.turno-chk').forEach(chkTurno => {
    chkTurno.addEventListener('change', () => {
      const nivel = chkTurno.dataset.nivel;
      const chkNivel = document.querySelector(`.nivel[data-nivel="${nivel}"]`);
      chkNivel.checked = estadoNivel(nivel);
      actualizarCheckboxCategoria();
      renderizarMarcadores();
    });
  });

  // Mantiene el checkbox de categoría "Educativas" coherente: tildado si algún nivel está activo
  function actualizarCheckboxCategoria() {
    const algunNivelActivo = Array.from(document.querySelectorAll('.nivel')).some(n => n.checked);
    document.getElementById('cat-educativa').checked = algunNivelActivo;
  }

  // ---------- Botones expandir/colapsar (signo +) ----------
  document.querySelectorAll('.btn-expandir').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const destino = document.getElementById(btn.dataset.target);
      const abrir = !destino.classList.contains('abierto');
      destino.classList.toggle('abierto', abrir);
      btn.classList.toggle('abierto', abrir);
    });
  });

  // Clic en el título "Educativas" también expande/colapsa sus niveles
  document.getElementById('titulo-educativa').addEventListener('click', () => {
    const btn = document.querySelector('.btn-expandir[data-target="niveles-educativa"]');
    btn.click();
  });

  // ---------- Colapsar / expandir el panel lateral completo ----------
  const appEl = document.getElementById('app');
  const panelEnvoltorio = document.getElementById('panel-envoltorio');
  const botonColapsar = document.getElementById('boton-colapsar');

  botonColapsar.addEventListener('click', () => {
    appEl.classList.toggle('colapsado');
    panelEnvoltorio.classList.toggle('colapsado');
    setTimeout(() => mapa.invalidateSize(), 230); // espera a que termine la transición CSS
  });
</script>

</body>
</html>
