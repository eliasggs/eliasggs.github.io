<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mapa de Instituciones — Villa Mercedes</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.css" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.Default.css" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Archivo:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

<style>
  :root {
    --crema: #F3EFE6;
    --verde-cartel: #1F4D3D;
    --verde-claro: #3C7A5F;
    --terracota: #C1623E;
    --terracota-suave: #E8A989;
    --tinta: #1B1B17;
    --linea: #D8D0BC;
    --blanco: #FFFFFF;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
  }

  body {
    font-family: 'Archivo', sans-serif;
    background: var(--crema);
    color: var(--tinta);
    display: flex;
    flex-direction: column;
  }

  /* ---------- Encabezado ---------- */
  header {
    background: var(--verde-cartel);
    color: var(--crema);
    padding: 12px 20px;
    border-bottom: 4px solid var(--terracota);
    position: relative;
    overflow: hidden;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 14px;
  }

  header::before {
    content: "";
    position: absolute;
    top: -50px; right: -30px;
    width: 110px; height: 110px;
    border: 2px solid rgba(243,239,230,0.1);
    border-radius: 50%;
  }

  .titulo-grupo {
    display: flex;
    align-items: baseline;
    gap: 10px;
    flex-wrap: wrap;
  }

  .eyebrow {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--terracota-suave);
    white-space: nowrap;
  }

  h1 {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 19px;
    margin: 0;
    line-height: 1.1;
    letter-spacing: -0.01em;
    white-space: nowrap;
  }

  h1 em { font-style: italic; color: var(--terracota-suave); }

  @media (max-width: 640px) {
    .eyebrow { display: none; }
    h1 { font-size: 16px; }
  }

  /* ---------- Layout principal ---------- */
  .app {
    display: flex;
    flex: 1 1 auto;
    min-height: 0;
    position: relative;
  }

  .mapa-contenedor {
    height: 100%;
    min-height: 0;
    flex: 1 1 auto;
  }

  /* ---------- Panel lateral ---------- */
  .panel-envoltorio {
    flex-shrink: 0;
    width: 300px;
    height: 100%;
    background: var(--blanco);
    border-right: 1px solid var(--linea);
    position: relative;
    overflow: hidden;
    transition: width 0.22s ease;
  }

  .panel-envoltorio.colapsado { width: 0; }

  .panel {
    width: 300px;
    height: 100%;
    padding: 16px 16px 24px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  .boton-colapsar {
    position: absolute;
    top: 45%;
    left: 286px;
    width: 28px; height: 28px;
    border-radius: 50%;
    background: var(--verde-cartel);
    color: var(--crema);
    border: 2px solid var(--blanco);
    box-shadow: 0 2px 8px rgba(27,27,23,0.25);
    cursor: pointer;
    z-index: 600;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    transition: left 0.22s ease, transform 0.22s ease, background 0.15s;
  }

  .boton-colapsar:hover { background: var(--verde-claro); }

  .app.colapsado .boton-colapsar {
    left: 0px;
    transform: rotate(180deg);
  }

  @media (max-width: 860px) {
    .panel-envoltorio {
      position: absolute;
      top: 0; left: 0;
      z-index: 550;
      box-shadow: 4px 0 18px rgba(27,27,23,0.18);
    }
    .panel-envoltorio.colapsado { width: 0; box-shadow: none; }
  }

  /* ---------- Buscador ---------- */
  .buscador-wrap {
    margin-bottom: 14px;
  }

  .buscador-input {
    width: 100%;
    padding: 8px 12px 8px 34px;
    border: 1.5px solid var(--linea);
    border-radius: 8px;
    font-family: 'Archivo', sans-serif;
    font-size: 13.5px;
    color: var(--tinta);
    background: var(--crema);
    outline: none;
    transition: border-color 0.15s;
    position: relative;
  }

  .buscador-input:focus { border-color: var(--verde-claro); background: var(--blanco); }
  .buscador-input::placeholder { color: #a39c87; }

  .buscador-icon {
    position: absolute;
    left: 24px;
    top: 50%;
    transform: translateY(-50%);
    color: #a39c87;
    pointer-events: none;
    font-size: 14px;
  }

  .buscador-contenedor {
    position: relative;
  }

  .buscador-resultados {
    display: none;
    position: absolute;
    top: calc(100% + 4px);
    left: 0; right: 0;
    background: var(--blanco);
    border: 1.5px solid var(--linea);
    border-radius: 8px;
    box-shadow: 0 6px 20px rgba(27,27,23,0.14);
    z-index: 700;
    max-height: 220px;
    overflow-y: auto;
  }

  .buscador-resultados.visible { display: block; }

  .buscador-item {
    padding: 9px 12px;
    font-size: 13px;
    cursor: pointer;
    border-bottom: 1px solid var(--linea);
    color: var(--tinta);
    transition: background 0.12s;
  }

  .buscador-item:last-child { border-bottom: none; }
  .buscador-item:hover { background: var(--crema); }

  .buscador-item-nombre { font-weight: 500; }
  .buscador-item-sub { font-size: 11px; color: #8a8473; margin-top: 1px; }

  .buscador-vacio {
    padding: 12px;
    font-size: 13px;
    color: #a39c87;
    font-style: italic;
  }

  /* ---------- Filtros ---------- */
  .panel-titulo {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--verde-claro);
    border-bottom: 2px solid var(--linea);
    padding-bottom: 8px;
    margin-bottom: 14px;
  }

  .grupo-filtro {
    margin-bottom: 8px;
    border-bottom: 1px solid var(--linea);
    padding-bottom: 8px;
  }

  .fila-categoria {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 2px;
  }

  .fila-categoria h3 {
    font-family: 'Fraunces', serif;
    font-size: 15px;
    font-weight: 600;
    margin: 0;
    color: var(--verde-cartel);
    display: flex;
    align-items: center;
    gap: 7px;
    flex: 1;
    cursor: pointer;
    user-select: none;
  }

  .fila-categoria input[type="checkbox"] {
    width: 16px; height: 16px;
    accent-color: var(--verde-cartel);
    cursor: pointer;
    flex-shrink: 0;
  }

  .punto {
    width: 9px; height: 9px;
    border-radius: 50%;
    display: inline-block;
    flex-shrink: 0;
  }

  .punto.educativa { background: var(--verde-claro); }
  .punto.cultural { background: var(--terracota); }

  .btn-expandir {
    width: 22px; height: 22px;
    border-radius: 5px;
    border: 1px solid var(--linea);
    background: var(--crema);
    color: var(--verde-cartel);
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    line-height: 1;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s, transform 0.15s;
  }

  .btn-expandir:hover { background: var(--linea); }
  .btn-expandir.abierto { transform: rotate(45deg); }

  /* Subniveles */
  .subniveles { display: none; padding-left: 16px; margin-top: 2px; }
  .subniveles.abierto { display: block; }

  /* Subcat nivel (escuelas, universidades, etc.) */
  .fila-subcat {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 5px 2px;
  }

  .fila-subcat label.chk {
    flex: 1;
    padding: 4px;
    margin: 0;
    font-weight: 500;
    color: var(--tinta);
  }

  /* Subniveles nivel 2: modalidades/turnos */
  .subturnos { display: none; padding-left: 18px; margin-bottom: 4px; }
  .subturnos.abierto { display: block; }

  label.chk {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13.5px;
    padding: 5px 4px;
    cursor: pointer;
    border-radius: 6px;
    transition: background 0.15s;
    user-select: none;
  }

  label.chk:hover { background: var(--crema); }

  label.chk input {
    width: 15px; height: 15px;
    accent-color: var(--verde-cartel);
    cursor: pointer;
    flex-shrink: 0;
  }

  label.chk.turno { font-size: 13px; color: #5c5648; }

  .resultados-info {
    margin-top: auto;
    padding-top: 14px;
    border-top: 1px solid var(--linea);
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--verde-claro);
  }

  .resultados-info strong {
    color: var(--verde-cartel);
    font-size: 20px;
    display: block;
    font-family: 'Fraunces', serif;
  }

  /* ---------- Mapa ---------- */
  #mapa {
    height: 100%;
    width: 100%;
    background: var(--linea);
  }

  /* ---------- Selector de estilo ---------- */
  .selector-estilo {
    position: absolute;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 500;
    background: var(--blanco);
    border-radius: 30px;
    box-shadow: 0 6px 20px rgba(27,27,23,0.22);
    padding: 4px;
    display: flex;
    gap: 2px;
  }

  .selector-estilo button {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    border: none;
    background: transparent;
    color: #8a8473;
    padding: 9px 16px;
    border-radius: 24px;
    cursor: pointer;
    transition: background 0.18s, color 0.18s;
    white-space: nowrap;
  }

  .selector-estilo button:hover { color: var(--verde-cartel); }
  .selector-estilo button.activo { background: var(--verde-cartel); color: var(--crema); }

  @media (max-width: 480px) {
    .selector-estilo { bottom: 14px; }
    .selector-estilo button { padding: 8px 11px; font-size: 10px; }
  }

  /* ---------- Popups ---------- */
  .leaflet-popup-content-wrapper {
    border-radius: 10px;
    box-shadow: 0 6px 24px rgba(27,27,23,0.18);
  }

  .leaflet-popup-content {
    margin: 16px 18px;
    width: 290px !important;
    font-family: 'Archivo', sans-serif;
  }

  .pop-tipo {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 4px;
    display: inline-block;
    margin-bottom: 8px;
  }

  .pop-tipo.educativa { background: #E3EEE7; color: var(--verde-cartel); }
  .pop-tipo.cultural { background: #F6E3D8; color: #8C4324; }

  .pop-nombre {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 16px;
    line-height: 1.25;
    margin: 0 0 10px;
    color: var(--tinta);
  }

  .pop-fila {
    font-size: 13px;
    line-height: 1.5;
    margin-bottom: 5px;
    color: #4a4640;
  }

  .pop-fila b { color: var(--tinta); }

  .pop-orientacion {
    font-size: 13px;
    color: #4a4640;
    font-style: italic;
    margin-bottom: 5px;
    padding: 6px 8px;
    border-left: 3px solid var(--verde-claro);
    background: #f0f6f2;
    border-radius: 0 5px 5px 0;
  }

  .pop-etiquetas {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    margin-top: 10px;
    margin-bottom: 8px;
  }

  .pop-etiqueta {
    font-size: 11px;
    font-family: 'Space Mono', monospace;
    padding: 3px 7px;
    border-radius: 4px;
    background: var(--crema);
    border: 1px solid var(--linea);
    color: #5c5648;
  }

  .pop-etiqueta.gestion-estatal { background: #e8f0ed; border-color: #b0cdc2; color: var(--verde-cartel); }
  .pop-etiqueta.gestion-privado { background: #fdf0e8; border-color: #e8c4a0; color: #7a4010; }
  .pop-etiqueta.gestion-autogestionada { background: #f0eafa; border-color: #c9ade0; color: #4a1f7a; }
  .pop-etiqueta.gestion-generativa { background: #e6f4e6; border-color: #9ecf9e; color: #1a5c1a; }

  .pop-turnos-bloque {
    margin-top: 10px;
    padding-top: 8px;
    border-top: 1px solid var(--linea);
  }

  .pop-turnos-titulo {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--verde-claro);
    margin-bottom: 5px;
  }

  .pop-turnos-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
  }

  .pop-turno-chip {
    font-size: 12px;
    padding: 3px 8px;
    border-radius: 12px;
    border: 1px solid var(--linea);
    color: #4a4640;
    background: var(--crema);
  }

  .pop-turno-chip.noche { background: #2B2B22; color: #F3EFE6; border-color: #2B2B22; }
  .pop-turno-chip.doble_turno, .pop-turno-chip.jornada_completa { background: #1F4D3D; color: #F3EFE6; border-color: #1F4D3D; }

  .pop-pendiente {
    margin-top: 10px;
    font-size: 12.5px;
    font-family: 'Space Mono', monospace;
    color: #8C4324;
    background: #F6E3D8;
    padding: 7px 9px;
    border-radius: 6px;
  }

  /* Botones de acción en el popup */
  .pop-acciones {
    display: flex;
    flex-direction: column;
    gap: 7px;
    margin-top: 12px;
  }

  .pop-boton-llegar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
    padding: 9px 10px;
    background: var(--terracota);
    color: var(--blanco) !important;
    font-family: 'Archivo', sans-serif;
    font-weight: 600;
    font-size: 13px;
    text-decoration: none;
    border-radius: 7px;
    transition: background 0.15s;
  }

  .pop-boton-llegar:hover { background: #A4502F; }
  .pop-boton-llegar svg { width: 15px; height: 15px; flex-shrink: 0; }

  .pop-boton-llamar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
    padding: 8px 10px;
    background: var(--blanco);
    color: var(--verde-cartel) !important;
    font-family: 'Archivo', sans-serif;
    font-weight: 600;
    font-size: 13px;
    text-decoration: none;
    border-radius: 7px;
    border: 2px solid var(--verde-cartel);
    transition: background 0.15s, color 0.15s;
  }

  .pop-boton-llamar:hover { background: var(--verde-cartel); color: var(--blanco) !important; }
  .pop-boton-llamar svg { width: 15px; height: 15px; flex-shrink: 0; }

  /* ---------- Marcadores personalizados ---------- */
  .marcador-icono {
    width: 30px; height: 30px;
    border-radius: 50% 50% 50% 0;
    transform: rotate(-45deg);
    border: 2px solid var(--blanco);
    box-shadow: 0 2px 6px rgba(0,0,0,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .marcador-icono span { transform: rotate(45deg); font-size: 13px; line-height: 1; }
  .marcador-icono.educativa { background: var(--verde-claro); }
  .marcador-icono.cultural { background: var(--terracota); }

  /* ---------- Clusters (agrupación de marcadores en zoom alejado) ---------- */
  .cluster-icono {
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--blanco);
    font-family: 'Space Mono', monospace;
    font-weight: 700;
    border: 3px solid var(--blanco);
    box-shadow: 0 2px 8px rgba(27,27,23,0.3);
  }

  .cluster-icono.educativa { background: var(--verde-claro); }
  .cluster-icono.cultural { background: var(--terracota); }
  .cluster-icono.mixto { background: var(--verde-cartel); }

  .cluster-icono.chico { width: 36px !important; height: 36px !important; font-size: 13px; }
  .cluster-icono.mediano { width: 44px !important; height: 44px !important; font-size: 14px; }
  .cluster-icono.grande { width: 52px !important; height: 52px !important; font-size: 15px; }

  /* ---------- Footer ---------- */
  footer {
    background: var(--verde-cartel);
    color: rgba(243,239,230,0.6);
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    text-align: center;
    padding: 10px;
    letter-spacing: 0.04em;
    flex-shrink: 0;
  }

  .panel::-webkit-scrollbar { width: 6px; }
  .panel::-webkit-scrollbar-thumb { background: var(--linea); border-radius: 3px; }
</style>
</head>
<body>

<header>
  <div class="titulo-grupo">
    <span class="eyebrow">Municipalidad de Villa Mercedes</span>
    <h1>Educación <em>&amp;</em> Cultura en el mapa</h1>
  </div>
</header>

<div class="app" id="app">
  <button class="boton-colapsar" id="boton-colapsar" aria-label="Colapsar panel de filtros">‹</button>

  <div class="panel-envoltorio" id="panel-envoltorio">
    <aside class="panel">

      <!-- ===== Buscador ===== -->
      <div class="buscador-wrap">
        <div class="buscador-contenedor">
          <span class="buscador-icon">🔍</span>
          <input
            type="text"
            id="buscador"
            class="buscador-input"
            placeholder="Buscar institución..."
            autocomplete="off"
          >
          <div class="buscador-resultados" id="buscador-resultados"></div>
        </div>
      </div>

      <div class="panel-titulo">Filtros</div>

      <!-- ===== Categoría: Educativas ===== -->
      <div class="grupo-filtro">
        <div class="fila-categoria">
          <input type="checkbox" id="cat-educativa" checked>
          <h3 id="titulo-educativa"><span class="punto educativa"></span>Educativas</h3>
          <button class="btn-expandir" data-target="subcats-educativa">+</button>
        </div>

        <div class="subniveles" id="subcats-educativa">

          <!-- Subcategoría: Escuelas -->
          <div class="fila-subcat">
            <label class="chk">
              <input type="checkbox" class="subcat-chk" data-subcat="escuela" checked>
              🏫 Escuelas
            </label>
            <button class="btn-expandir" data-target="turnos-escuela">+</button>
          </div>
          <div class="subturnos" id="turnos-escuela">
            <label class="chk turno"><input type="checkbox" class="turno-chk" data-subcat="escuela" data-turno="manana" checked> ☀️ Mañana</label>
            <label class="chk turno"><input type="checkbox" class="turno-chk" data-subcat="escuela" data-turno="tarde" checked> 🌤️ Tarde</label>
            <label class="chk turno"><input type="checkbox" class="turno-chk" data-subcat="escuela" data-turno="noche" checked> 🌙 Noche</label>
            <label class="chk turno"><input type="checkbox" class="turno-chk" data-subcat="escuela" data-turno="doble_turno" checked> ⏰ Doble turno</label>
            <label class="chk turno"><input type="checkbox" class="turno-chk" data-subcat="escuela" data-turno="jornada_completa" checked> 📅 Jornada completa</label>
            <label class="chk turno"><input type="checkbox" class="turno-chk" data-subcat="escuela" data-turno="vespertino" checked> 🌅 Vespertino</label>
          </div>

          <!-- Subcategoría: Universidades -->
          <div class="fila-subcat">
            <label class="chk">
              <input type="checkbox" class="subcat-chk" data-subcat="universidad" checked>
              🎓 Universidades
            </label>
          </div>

          <!-- Subcategoría: IFD -->
          <div class="fila-subcat">
            <label class="chk">
              <input type="checkbox" class="subcat-chk" data-subcat="ifd" checked>
              📚 Inst. de Formación Docente
            </label>
          </div>

          <!-- Subcategoría: Formación Profesional -->
          <div class="fila-subcat">
            <label class="chk">
              <input type="checkbox" class="subcat-chk" data-subcat="formacion_profesional" checked>
              🔧 Inst. de Formación Profesional
            </label>
          </div>

        </div>
      </div>

      <!-- ===== Categoría: Culturales ===== -->
      <div class="grupo-filtro">
        <div class="fila-categoria">
          <input type="checkbox" id="cat-cultural" checked>
          <h3><span class="punto cultural"></span>Culturales</h3>
        </div>
      </div>

      <div class="resultados-info">
        <strong id="contador-resultados">0</strong>
        instituciones visibles en el mapa
      </div>
    </aside>
  </div>

  <div class="mapa-contenedor" style="position: relative;">
    <div id="mapa"></div>
    <div class="selector-estilo" id="selector-estilo">
      <button data-estilo="claro" class="activo">Claro</button>
      <button data-estilo="calco">Calco</button>
      <button data-estilo="satelital">Satélite</button>
    </div>
  </div>
</div>

<footer>Datos de Villa Mercedes, San Luis · Actualizar en instituciones.json</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/leaflet.markercluster.js"></script>
<script>
  // ---------- Mapa ----------
  const mapa = L.map('mapa', { zoomControl: false }).setView([-33.6755, -65.4540], 14);
  setTimeout(() => mapa.invalidateSize(), 0);
  window.addEventListener('resize', () => mapa.invalidateSize());

  const capasEstilo = {
    claro: L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/attributions">CARTO</a>',
      maxZoom: 20, subdomains: 'abcd'
    }),
    calco: L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/light_all/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/attributions">CARTO</a>',
      maxZoom: 20, subdomains: 'abcd'
    }),
    satelital: L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
      attribution: 'Tiles &copy; Esri', maxZoom: 19
    })
  };

  let capaActual = capasEstilo.claro.addTo(mapa);

  function cambiarEstiloMapa(estilo) {
    if (capasEstilo[estilo] === capaActual) return;
    mapa.removeLayer(capaActual);
    capaActual = capasEstilo[estilo].addTo(mapa);
    document.querySelectorAll('.selector-estilo button').forEach(btn => {
      btn.classList.toggle('activo', btn.dataset.estilo === estilo);
    });
  }

  document.querySelectorAll('.selector-estilo button').forEach(btn => {
    btn.addEventListener('click', () => cambiarEstiloMapa(btn.dataset.estilo));
  });

  let instituciones = [];
  let marcadores = [];
  let marcadorDestacado = null;

  // Un grupo de cluster por tipo, para que cada uno mantenga su color e ícono.
  // Esto evita que el mapa tenga 200+ elementos del DOM sueltos en zoom alejado:
  // los agrupa en círculos numerados y solo "abre" los marcadores individuales
  // cuando el zoom está lo bastante cerca.
  function crearClusterIcono(count, tipo) {
    let tamano = 'chico';
    if (count >= 50) tamano = 'grande';
    else if (count >= 15) tamano = 'mediano';
    return L.divIcon({
      html: `<div class="cluster-icono ${tipo} ${tamano}"><span>${count}</span></div>`,
      className: '',
      iconSize: L.point(40, 40)
    });
  }

  const clusterEducativa = L.markerClusterGroup({
    maxClusterRadius: 60,
    spiderfyOnMaxZoom: true,
    showCoverageOnHover: false,
    iconCreateFunction: cluster => crearClusterIcono(cluster.getChildCount(), 'educativa')
  });

  const clusterCultural = L.markerClusterGroup({
    maxClusterRadius: 60,
    spiderfyOnMaxZoom: true,
    showCoverageOnHover: false,
    iconCreateFunction: cluster => crearClusterIcono(cluster.getChildCount(), 'cultural')
  });

  clusterEducativa.addTo(mapa);
  clusterCultural.addTo(mapa);

  function grupoDeTipo(tipo) {
    return tipo === 'cultural' ? clusterCultural : clusterEducativa;
  }

  function crearIcono(tipo) {
    const emoji = tipo === 'educativa' ? '🏫' : '🎭';
    return L.divIcon({
      className: '',
      html: `<div class="marcador-icono ${tipo}"><span>${emoji}</span></div>`,
      iconSize: [30, 30],
      iconAnchor: [15, 28],
      popupAnchor: [0, -26]
    });
  }

  // ---------- Nombres de turnos ----------
  const NOMBRES_TURNO = {
    manana: '☀️ Mañana',
    tarde: '🌤️ Tarde',
    noche: '🌙 Noche',
    doble_turno: '⏰ Doble turno',
    jornada_completa: '📅 Jornada completa',
    vespertino: '🌅 Vespertino',
  };

  // ---------- Etiqueta de gestión ----------
  function claseGestion(gestion) {
    if (!gestion) return '';
    const g = gestion.toUpperCase();
    if (g.includes('ESTATAL')) return 'gestion-estatal';
    if (g.includes('PRIVADO')) return 'gestion-privado';
    if (g.includes('AUTOGESTIONADA') || g.includes('AUTOGESTION')) return 'gestion-autogestionada';
    if (g.includes('GENERATIVA')) return 'gestion-generativa';
    return '';
  }

  function labelGestion(gestion) {
    if (!gestion) return null;
    const g = gestion.toUpperCase();
    if (g.includes('ESTATAL')) return '🏛️ Estatal';
    if (g.includes('PRIVADO')) return '🏢 Privada';
    if (g.includes('AUTOGESTIONADA')) return '🤝 Pública autogestionada';
    if (g.includes('GENERATIVA')) return '🌱 Generativa';
    return gestion;
  }

  // ---------- Botones de acción ----------
  function botonComoLlegar(inst) {
    const url = `https://www.google.com/maps/dir/?api=1&destination=${inst.lat},${inst.lng}`;
    return `
      <a class="pop-boton-llegar" href="${url}" target="_blank" rel="noopener noreferrer">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="3 11 22 2 13 21 11 13 3 11"></polygon></svg>
        Cómo llegar
      </a>`;
  }

  function botonesLlamar(telefonos) {
    if (!telefonos || telefonos.length === 0) return '';
    return telefonos.map(tel => {
      const telLimpio = tel.replace(/[\s\-]/g, '');
      const href = `tel:${telLimpio}`;
      return `
        <a class="pop-boton-llamar" href="${href}">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.44 2 2 0 0 1 3.6 1.27h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.84a16 16 0 0 0 6.29 6.29l.93-.93a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
          Llamar · ${tel}
        </a>`;
    }).join('');
  }

  // ---------- Popup educativa ----------
  function construirPopupEducativa(inst) {
    const subcatLabel = {
      escuela: 'Escuela',
      universidad: 'Universidad',
      ifd: 'Inst. Formación Docente',
      formacion_profesional: 'Inst. Formación Profesional',
    }[inst.subcategoria] || 'Institución educativa';

    const gestLabel = labelGestion(inst.tipo_gestion);
    const gestClass = claseGestion(inst.tipo_gestion);

    let etiquetasHtml = '<div class="pop-etiquetas">';
    if (gestLabel) etiquetasHtml += `<span class="pop-etiqueta ${gestClass}">${gestLabel}</span>`;
    if (inst.modalidad) etiquetasHtml += `<span class="pop-etiqueta">${inst.modalidad}</span>`;
    etiquetasHtml += '</div>';

    let orientacionHtml = '';
    if (inst.orientacion && inst.orientacion.toLowerCase() !== 'orientación' && inst.orientacion.trim()) {
      orientacionHtml = `<div class="pop-orientacion">📐 ${inst.orientacion}</div>`;
    }

    let descripcionHtml = '';
    if (inst.descripcion) {
      descripcionHtml = `<div class="pop-fila" style="margin-top:6px;font-size:12.5px;color:#6a6258;">${inst.descripcion}</div>`;
    }

    let turnosHtml = '';
    if (inst.turnos && inst.turnos.length > 0) {
      const chips = inst.turnos.map(t =>
        `<span class="pop-turno-chip ${t}">${NOMBRES_TURNO[t] || t}</span>`
      ).join('');
      turnosHtml = `
        <div class="pop-turnos-bloque">
          <div class="pop-turnos-titulo">Turnos</div>
          <div class="pop-turnos-chips">${chips}</div>
        </div>`;
    }

    const telefonoTexto = inst.telefonos && inst.telefonos.length > 0
      ? inst.telefonos.join(' · ')
      : (inst.telefono || null);

    return `
      <div class="pop-tipo educativa">${subcatLabel}</div>
      <p class="pop-nombre">${inst.nombre}</p>
      ${etiquetasHtml}
      ${orientacionHtml}
      ${inst.direccion ? `<div class="pop-fila"><b>Dirección:</b> ${inst.direccion}</div>` : ''}
      ${telefonoTexto ? `<div class="pop-fila"><b>Teléfono:</b> ${telefonoTexto}</div>` : ''}
      ${inst.email ? `<div class="pop-fila"><b>Email:</b> ${inst.email}</div>` : ''}
      ${turnosHtml}
      ${inst.niveles_str ? `<div class="pop-fila" style="margin-top:8px;"><b>Niveles:</b> ${inst.niveles_str}</div>` : ''}
      ${descripcionHtml}
      ${inst.datos_pendientes ? '<div class="pop-pendiente">📋 Datos pendientes de completar</div>' : ''}
      <div class="pop-acciones">
        ${botonComoLlegar(inst)}
        ${botonesLlamar(inst.telefonos)}
      </div>
    `;
  }

  function construirPopupCultural(inst) {
    return `
      <div class="pop-tipo cultural">Institución cultural</div>
      <p class="pop-nombre">${inst.nombre}</p>
      <div class="pop-fila"><b>Dirección:</b> ${inst.direccion || '—'}</div>
      <div class="pop-fila"><b>Teléfono:</b> ${inst.telefono || '—'}</div>
      <div class="pop-fila"><b>Email:</b> ${inst.email || '—'}</div>
      <div class="pop-fila"><b>Horarios:</b> ${inst.horarios || '—'}</div>
      <div class="pop-fila"><b>Actividades:</b> ${inst.actividades || '—'}</div>
      <div class="pop-acciones">
        ${botonComoLlegar(inst)}
        ${botonesLlamar(inst.telefonos || [])}
      </div>
    `;
  }

  // ---------- Lógica de filtros ----------
  function subcatVisible(subcat) {
    const chk = document.querySelector(`.subcat-chk[data-subcat="${subcat}"]`);
    return chk ? chk.checked : true;
  }

  function turnosActivosDeSubcat(subcat) {
    return Array.from(document.querySelectorAll(`.turno-chk[data-subcat="${subcat}"]:checked`))
      .map(t => t.dataset.turno);
  }

  function institucionVisible(inst) {
    if (inst.tipo === 'cultural') {
      return document.getElementById('cat-cultural').checked;
    }

    if (!document.getElementById('cat-educativa').checked) return false;
    if (!subcatVisible(inst.subcategoria || 'escuela')) return false;

    // Si no hay turnos en los datos, mostrar siempre que la subcat esté activa
    if (!inst.turnos || inst.turnos.length === 0) return true;

    // Verificar si al menos un turno de la institución está activo en el filtro
    const turnosActivos = turnosActivosDeSubcat(inst.subcategoria || 'escuela');
    // Si la subcat no tiene filtros de turno, mostrar siempre
    if (turnosActivos.length === 0 && !document.querySelector(`.turno-chk[data-subcat="${inst.subcategoria}"]`)) return true;

    return inst.turnos.some(t => turnosActivos.includes(t));
  }

  // Los marcadores se crean UNA SOLA VEZ al cargar los datos. Después, al cambiar
  // un filtro, solo se agregan/quitan del grupo de cluster correspondiente — no se
  // reconstruyen desde cero. Esto evita rehacer cientos de marcadores con cada click
  // en un checkbox, y el clustering evita que el zoom tenga que recalcular la
  // posición de todos los marcadores sueltos a la vez.
  function crearTodosLosMarcadores() {
    instituciones.forEach(inst => {
      if (!inst.lat || !inst.lng) return;
      const marcador = L.marker([inst.lat, inst.lng], { icon: crearIcono(inst.tipo) });
      // Popup perezoso: el HTML se construye solo al abrirlo, no al crear el marcador.
      marcador.bindPopup('', { maxWidth: 320 });
      marcador.on('popupopen', () => {
        const contenido = inst.tipo === 'educativa'
          ? construirPopupEducativa(inst)
          : construirPopupCultural(inst);
        marcador.setPopupContent(contenido);
      });
      marcadores.push({ marcador, inst });
    });
  }

  function renderizarMarcadores() {
    // Agregar/quitar de a uno dispara un recálculo del cluster por cada marcador.
    // En cambio: vaciamos los grupos y volvemos a llenarlos de una sola vez con
    // addLayers(), que hace UN solo recálculo al final. Mucho más rápido con 100+ puntos.
    const capas = { educativa: [], cultural: [] };

    let visibles = 0;
    marcadores.forEach(m => {
      if (institucionVisible(m.inst)) {
        capas[m.inst.tipo] = capas[m.inst.tipo] || [];
        capas[m.inst.tipo].push(m.marcador);
        visibles++;
      }
    });

    clusterEducativa.clearLayers();
    clusterCultural.clearLayers();
    if (capas.educativa) clusterEducativa.addLayers(capas.educativa);
    if (capas.cultural) clusterCultural.addLayers(capas.cultural);

    document.getElementById('contador-resultados').textContent = visibles;
  }

  // ---------- Buscador ----------
  const inputBuscador = document.getElementById('buscador');
  const divResultados = document.getElementById('buscador-resultados');

  function normalizarTexto(t) {
    return t.toLowerCase()
      .normalize('NFD')
      .replace(/[\u0300-\u036f]/g, '');
  }

  function mostrarResultadosBusqueda(query) {
    divResultados.innerHTML = '';
    if (!query || query.length < 2) {
      divResultados.classList.remove('visible');
      return;
    }

    const q = normalizarTexto(query);
    const encontrados = instituciones.filter(inst =>
      inst.lat && inst.lng && normalizarTexto(inst.nombre).includes(q)
    ).slice(0, 8);

    if (encontrados.length === 0) {
      divResultados.innerHTML = '<div class="buscador-vacio">Sin resultados</div>';
      divResultados.classList.add('visible');
      return;
    }

    encontrados.forEach(inst => {
      const div = document.createElement('div');
      div.className = 'buscador-item';
      const subcatLabel = {
        escuela: 'Escuela',
        universidad: 'Universidad',
        ifd: 'Inst. Formación Docente',
        formacion_profesional: 'Inst. Formación Profesional',
      }[inst.subcategoria] || 'Educativa';
      div.innerHTML = `
        <div class="buscador-item-nombre">${inst.nombre}</div>
        <div class="buscador-item-sub">${subcatLabel}${inst.direccion ? ' · ' + inst.direccion : ''}</div>
      `;
      div.addEventListener('click', () => {
        mapa.setView([inst.lat, inst.lng], 16);
        // Buscar y abrir popup del marcador
        const entry = marcadores.find(m => m.inst.id === inst.id);
        if (entry) entry.marcador.openPopup();
        divResultados.classList.remove('visible');
        inputBuscador.value = inst.nombre;
      });
      divResultados.appendChild(div);
    });

    divResultados.classList.add('visible');
  }

  inputBuscador.addEventListener('input', e => mostrarResultadosBusqueda(e.target.value));
  inputBuscador.addEventListener('focus', e => mostrarResultadosBusqueda(e.target.value));
  document.addEventListener('click', e => {
    if (!e.target.closest('.buscador-contenedor')) {
      divResultados.classList.remove('visible');
    }
  });

  // ---------- Carga de datos ----------
  fetch('instituciones.json')
    .then(res => res.json())
    .then(data => {
      instituciones = data.instituciones;
      crearTodosLosMarcadores();
      renderizarMarcadores();
    })
    .catch(err => {
      console.error('Error cargando instituciones.json', err);
      document.getElementById('contador-resultados').textContent = '0';
    });

  // ---------- Evento: categoría educativa madre ----------
  document.getElementById('cat-educativa').addEventListener('change', (e) => {
    const activo = e.target.checked;
    document.querySelectorAll('.subcat-chk, .turno-chk').forEach(chk => chk.checked = activo);
    renderizarMarcadores();
  });

  document.getElementById('cat-cultural').addEventListener('change', renderizarMarcadores);

  // ---------- Evento: subcategorías ----------
  document.querySelectorAll('.subcat-chk').forEach(chkSubcat => {
    chkSubcat.addEventListener('change', () => {
      const subcat = chkSubcat.dataset.subcat;
      // Propagar a turnos hijos si los hay
      document.querySelectorAll(`.turno-chk[data-subcat="${subcat}"]`).forEach(t => {
        t.checked = chkSubcat.checked;
      });
      actualizarCheckboxCategoriaEducativa();
      renderizarMarcadores();
    });
  });

  // ---------- Evento: turnos ----------
  document.querySelectorAll('.turno-chk').forEach(chkTurno => {
    chkTurno.addEventListener('change', () => {
      const subcat = chkTurno.dataset.subcat;
      // Si se apagan todos los turnos de una subcat, apagar la subcat
      const turnosDeSubcat = document.querySelectorAll(`.turno-chk[data-subcat="${subcat}"]`);
      const hayAlguno = Array.from(turnosDeSubcat).some(t => t.checked);
      const chkSubcat = document.querySelector(`.subcat-chk[data-subcat="${subcat}"]`);
      if (chkSubcat) chkSubcat.checked = hayAlguno;
      actualizarCheckboxCategoriaEducativa();
      renderizarMarcadores();
    });
  });

  function actualizarCheckboxCategoriaEducativa() {
    const algunaSubcatActiva = Array.from(document.querySelectorAll('.subcat-chk')).some(s => s.checked);
    document.getElementById('cat-educativa').checked = algunaSubcatActiva;
  }

  // ---------- Botones expandir/colapsar ----------
  document.querySelectorAll('.btn-expandir').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const destino = document.getElementById(btn.dataset.target);
      const abrir = !destino.classList.contains('abierto');
      destino.classList.toggle('abierto', abrir);
      btn.classList.toggle('abierto', abrir);
    });
  });

  document.getElementById('titulo-educativa').addEventListener('click', () => {
    const btn = document.querySelector('.btn-expandir[data-target="subcats-educativa"]');
    btn.click();
  });

  // ---------- Colapsar panel lateral ----------
  const appEl = document.getElementById('app');
  const panelEnvoltorio = document.getElementById('panel-envoltorio');
  const botonColapsar = document.getElementById('boton-colapsar');

  botonColapsar.addEventListener('click', () => {
    appEl.classList.toggle('colapsado');
    panelEnvoltorio.classList.toggle('colapsado');
    setTimeout(() => mapa.invalidateSize(), 230);
  });
</script>

</body>
</html>
